<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendRadar Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* 1. 背景色：由死黑改为更温润的深航海蓝 */
            --bg-primary: #0f141c;
            --bg-card: #171f2c;
            
            /* 2. 边框与交互：降低亮度和生硬感 */
            --border-color: #242f42;
            --border-hover: #34445e;
            
            /* 3. 核心点缀色：由刺眼的荧光色改为柔和的马卡龙/莫兰迪色 */
            --accent-cyan: #4cd3e3;    /* 降低了饱和度，不再晃眼 */
            --accent-purple: #9d7df3;  /* 更温和的丁香紫 */
            --success: #3cd070;        /* 柔和绿 */
            --warning: #f0a04b;        /* 琥珀黄 */
            --danger: #eb5757;         /* 珊瑚红 */
            
            /* 4. 文字色：避免使用 100% 纯白 */
            --text-main: #d1d5db;
            --text-muted: #828fa3;
        }
        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #0f141c; /* 亮色背景配深色字，更易读 */
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            opacity: 0.92;
            box-shadow: 0 0 15px rgba(76, 211, 227, 0.3);
        }
        .btn-secondary {
            background-color: var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .btn-secondary:hover {
            background-color: var(--border-hover);
            color: #ffffff;
        }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            color: var(--text-muted);
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background-color: rgba(36, 47, 66, 0.6);
            color: var(--accent-cyan);
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-success { background-color: var(--success); box-shadow: 0 0 6px var(--success); }
        .status-failed { background-color: var(--danger); box-shadow: 0 0 6px var(--danger); }
        .status-pending { background-color: var(--text-muted); }
        
        /* 5. 优化控制台：黑底绿字改成深灰底配柔和绿，降低对比疲劳 */
        .log-output {
            background-color: #0c1017;
            color: #a3e635; /* 略带黄调的嫩绿，比纯绿更护眼 */
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            padding: 1.25rem;
            border-radius: 8px;
            overflow-y: auto;
            max-height: 400px;
            border: 1px solid #1a2332;
        }
        .log-error { color: var(--danger); }
        .log-warn { color: var(--warning); }
        
        .timeline-bar {
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #0f141c;
            font-weight: 600;
        }
        
        /* 6. 优化代码编辑器 */
        .code-editor {
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
            font-size: 15px;
            line-height: 1.6;
            background-color: #0c1017;
            color: #c9d1d9;
            border-color: var(--border-color);
        }
        
        /* 7. 优化滚动条，让其更隐蔽 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }
    </style>
</head>
<body x-data="app()" x-init="init()">
    <!-- 登录弹窗 -->
    <div x-show="authRequired && !authenticated" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="card p-8 w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4 text-center">🔐 管理员登录</h2>
            <p class="text-gray-400 mb-6 text-center">请输入访问令牌</p>
            <input 
                type="password" 
                x-model="token"
                @keyup.enter="login()"
                placeholder="Bearer Token"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 mb-4 focus:outline-none focus:border-cyan-500"
            >
            <button @click="login()" class="btn-primary w-full">登录</button>
            <p x-show="authError" x-text="authError" class="text-red-500 mt-3 text-center"></p>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col">
            <div class="p-4 border-b border-gray-800">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <span class="text-cyan-400">⚡</span>
                    TrendRadar
                </h1>
                <p class="text-xs text-gray-500 mt-1">管理仪表盘</p>
            </div>
            
            <nav class="flex-1 p-4 space-y-1">
                <a href="#/" @click.prevent="navigate('')" 
                   :class="{'active': currentPage === ''}" class="sidebar-link">
                    <span>📊</span> 仪表盘
                </a>
                <a href="#/news" @click.prevent="navigate('news')" 
                   :class="{'active': currentPage === 'news'}" class="sidebar-link">
                    <span>📰</span> 新闻浏览
                </a>
                <a href="#/rss" @click.prevent="navigate('rss')" 
                   :class="{'active': currentPage === 'rss'}" class="sidebar-link">
                    <span>📡</span> RSS 订阅
                </a>
                <a href="#/config" @click.prevent="navigate('config')" 
                   :class="{'active': currentPage === 'config'}" class="sidebar-link">
                    <span>⚙️</span> 配置管理
                </a>
                <a href="#/schedule" @click.prevent="navigate('schedule')" 
                   :class="{'active': currentPage === 'schedule'}" class="sidebar-link">
                    <span>⏰</span> 调度监控
                </a>
                <a href="#/actions" @click.prevent="navigate('actions')" 
                   :class="{'active': currentPage === 'actions'}" class="sidebar-link">
                    <span>🚀</span> 手动操作
                </a>
            </nav>
            
            <div class="p-4 border-t border-gray-800">
                <a href="#/system" @click.prevent="navigate('system')" 
                   :class="{'active': currentPage === 'system'}" class="sidebar-link text-sm">
                    <span>ℹ️</span> 系统信息
                </a>
                <div class="mt-4 text-xs text-gray-600">
                    v<span x-text="version"></span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 overflow-auto">
            <!-- 顶部栏 -->
            <header class="bg-gray-900/50 border-b border-gray-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
                <h2 x-text="pageTitle" class="text-xl font-semibold"></h2>
                <div class="flex items-center gap-4">
                    <span x-show="authEnabled" class="text-xs text-gray-500 flex items-center gap-1">
                        <span class="status-dot status-success"></span>
                        已认证
                    </span>
                    <span x-text="currentTime" class="text-sm text-gray-400 font-mono"></span>
                </div>
            </header>

            <!-- 页面内容 -->
            <div class="p-6">
                <!-- 仪表盘 -->
                <div x-show="currentPage === ''" x-cloak>
                    <div x-html="renderDashboard()"></div>
                </div>

                <!-- 新闻浏览 -->
                <div x-show="currentPage === 'news'" x-cloak>
                    <div x-html="renderNews()"></div>
                </div>

                <!-- RSS 订阅 -->
                <div x-show="currentPage === 'rss'" x-cloak>
                    <div x-html="renderRSS()"></div>
                </div>

                <!-- 配置管理 -->
                <div x-show="currentPage === 'config'" x-cloak>
                    <div x-html="renderConfig()"></div>
                </div>

                <!-- 调度监控 -->
                <div x-show="currentPage === 'schedule'" x-cloak>
                    <div x-html="renderSchedule()"></div>
                </div>

                <!-- 手动操作 -->
                <div x-show="currentPage === 'actions'" x-cloak>
                    <div x-html="renderActions()"></div>
                </div>

                <!-- 系统信息 -->
                <div x-show="currentPage === 'system'" x-cloak>
                    <div x-html="renderSystem()"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function app() {
            return {
                // 状态
                currentPage: '',
                currentTime: '',
                version: '6.7.0',
                authRequired: false,
                authEnabled: false,
                authenticated: false,
                token: localStorage.getItem('admin_token') || '',
                authError: '',
                
                // 数据
                dashboardData: null,
                newsData: { items: [], total: 0, page: 1, platforms: [] },
                rssData: { items: [], total: 0, page: 1, feeds: [] },
                scheduleData: null,
                systemData: null,
                configData: {},
                
                // 筛选状态
                newsFilter: { date: '', platform: '', keyword: '', sort_by: 'rank' },
                rssFilter: { date: '', feed: '', keyword: '' },
                
                // 操作状态
                runningActions: {},
                logs: {},
                
                // 配置编辑
                activeConfigTab: 'config_yaml',
                configContent: '',
                configParsed: null,
                configBackups: [],
                
                // 时间刷新
                timeInterval: null,
                
                get pageTitle() {
                    const titles = {
                        '': '仪表盘',
                        'news': '新闻浏览',
                        'rss': 'RSS 订阅',
                        'config': '配置管理',
                        'schedule': '调度监控',
                        'actions': '手动操作',
                        'system': '系统信息'
                    };
                    return titles[this.currentPage] || '仪表盘';
                },
                
                async init() {
                    // 检查认证
                    await this.checkAuth();
                    
                    // 路由处理
                    this.handleHash();
                    window.addEventListener('hashchange', () => this.handleHash());
                    
                    // 时间更新
                    this.updateTime();
                    this.timeInterval = setInterval(() => this.updateTime(), 1000);
                    
                    // 加载初始数据
                    if (!this.authRequired || this.authenticated) {
                        this.loadPageData();
                    }
                },
                
                async checkAuth() {
                    try {
                        const res = await this.apiCall('/api/system/info');
                        this.authEnabled = res.data?.auth_enabled || false;
                        this.authRequired = this.authEnabled && !this.token;
                        this.authenticated = !this.authRequired;
                    } catch (e) {
                        this.authRequired = true;
                    }
                },
                
                async login() {
                    if (!this.token) return;
                    
                    // 测试 token
                    try {
                        const res = await fetch('/api/system/info', {
                            headers: { 'Authorization': `Bearer ${this.token}` }
                        });
                        if (res.ok) {
                            localStorage.setItem('admin_token', this.token);
                            this.authenticated = true;
                            this.authRequired = false;
                            this.authError = '';
                            this.loadPageData();
                        } else {
                            this.authError = '无效的访问令牌';
                        }
                    } catch (e) {
                        this.authError = '连接失败';
                    }
                },
                
                async apiCall(url, options = {}) {
                    const headers = {
                        'Content-Type': 'application/json',
                        ...options.headers
                    };
                    
                    if (this.token) {
                        headers['Authorization'] = `Bearer ${this.token}`;
                    }
                    
                    const res = await fetch(url, { ...options, headers });
                    if (res.status === 401) {
                        this.authRequired = true;
                        this.authenticated = false;
                        throw new Error('Unauthorized');
                    }
                    return res.json();
                },
                
                handleHash() {
                    const hash = window.location.hash.replace('#/', '') || '';
                    this.currentPage = hash.split('?')[0];
                    this.loadPageData();
                },
                
                navigate(page) {
                    window.location.hash = page ? `#/${page}` : '#/';
                },
                
                updateTime() {
                    const now = new Date();
                    this.currentTime = now.toLocaleTimeString('zh-CN', { hour12: false });
                },
                
                loadPageData() {
                    switch (this.currentPage) {
                        case '':
                            this.loadDashboard();
                            break;
                        case 'news':
                            this.loadNews();
                            break;
                        case 'rss':
                            this.loadRSS();
                            break;
                        case 'config':
                            this.loadConfig();
                            break;
                        case 'schedule':
                            this.loadSchedule();
                            break;
                        case 'system':
                            this.loadSystem();
                            break;
                    }
                },
                
                // ========== API 调用 ==========
                async loadDashboard() {
                    try {
                        const [dashboard, chart] = await Promise.all([
                            this.apiCall('/api/dashboard'),
                            this.apiCall('/api/dashboard/chart')
                        ]);
                        
                        if (dashboard.success) {
                            this.dashboardData = dashboard.data;
                        }
                        
                        // 渲染图表
                        this.$nextTick(() => {
                            if (chart.success) {
                                this.renderChart(chart.data);
                            }
                        });
                    } catch (e) {
                        console.error('Failed to load dashboard:', e);
                    }
                },
                
                async loadNews() {
                    try {
                        const params = new URLSearchParams({
                            page: this.newsData.page,
                            per_page: 50
                        });
                        if (this.newsFilter.platform) params.append('platform', this.newsFilter.platform);
                        if (this.newsFilter.keyword) params.append('keyword', this.newsFilter.keyword);
                        if (this.newsFilter.sort_by) params.append('sort_by', this.newsFilter.sort_by);
                        
                        const res = await this.apiCall(`/api/news?${params}`);
                        if (res.success) {
                            this.newsData = res.data;
                        }
                    } catch (e) {
                        console.error('Failed to load news:', e);
                    }
                },
                
                async loadRSS() {
                    try {
                        const params = new URLSearchParams({
                            page: this.rssData.page,
                            per_page: 50
                        });
                        if (this.rssFilter.feed) params.append('feed', this.rssFilter.feed);
                        if (this.rssFilter.keyword) params.append('keyword', this.rssFilter.keyword);
                        
                        const res = await this.apiCall(`/api/rss?${params}`);
                        if (res.success) {
                            this.rssData = res.data;
                        }
                    } catch (e) {
                        console.error('Failed to load RSS:', e);
                    }
                },
                
                async loadConfig() {
                    try {
                        const res = await this.apiCall(`/api/config/${this.activeConfigTab}?parsed=true`);
                        if (res.success) {
                            this.configContent = res.data.content;
                            this.configParsed = res.data.parsed;
                        }
                        
                        // 加载备份列表
                        const backups = await this.apiCall(`/api/config/${this.activeConfigTab}/backups`);
                        if (backups.success) {
                            this.configBackups = backups.data.backups;
                        }
                    } catch (e) {
                        console.error('Failed to load config:', e);
                    }
                },
                
                async loadSchedule() {
                    try {
                        const res = await this.apiCall('/api/schedule');
                        if (res.success) {
                            this.scheduleData = res.data;
                        }
                    } catch (e) {
                        console.error('Failed to load schedule:', e);
                    }
                },
                
                async loadSystem() {
                    try {
                        const res = await this.apiCall('/api/system/info');
                        if (res.success) {
                            this.systemData = res.data;
                            this.version = res.data.version;
                        }
                    } catch (e) {
                        console.error('Failed to load system info:', e);
                    }
                },
                
                // ========== 渲染方法 ==========
                renderDashboard() {
                    if (!this.dashboardData) return '<div class="text-center py-12 text-gray-500">加载中...</div>';
                    
                    const { today, platforms, top_news } = this.dashboardData;
                    
                    return `
                        <!-- 统计卡片 -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                            <div class="card p-4">
                                <div class="text-sm text-gray-400 mb-1">今日采集条数</div>
                                <div class="text-3xl font-bold text-cyan-400">${today.news_count}</div>
                            </div>
                            <div class="card p-4">
                                <div class="text-sm text-gray-400 mb-1">今日 RSS 条数</div>
                                <div class="text-3xl font-bold text-purple-400">${today.rss_count}</div>
                            </div>
                            <div class="card p-4">
                                <div class="text-sm text-gray-400 mb-1">最近采集时间</div>
                                <div class="text-xl font-semibold">${today.last_crawl ? new Date(today.last_crawl).toLocaleString('zh-CN') : '-'}</div>
                            </div>
                            <div class="card p-4">
                                <div class="text-sm text-gray-400 mb-1">数据库文件数</div>
                                <div class="text-xl font-semibold">
                                    新闻: ${today.db_count.news} / RSS: ${today.db_count.rss}
                                </div>
                            </div>
                        </div>
                        
                        <!-- 平台状态 -->
                        <div class="card p-4 mb-6">
                            <h3 class="text-lg font-semibold mb-4">平台采集状态</h3>
                            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                                ${platforms.map(p => `
                                    <div class="flex items-center gap-2 p-2 bg-gray-800/50 rounded-lg">
                                        <span class="status-dot ${p.status === 'success' ? 'status-success' : p.status === 'failed' ? 'status-failed' : 'status-pending'}"></span>
                                        <span class="text-sm truncate">${p.name}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <!-- 趋势图 -->
                        <div class="card p-4 mb-6">
                            <h3 class="text-lg font-semibold mb-4">近 7 天采集量趋势</h3>
                            <canvas id="trendChart" height="100"></canvas>
                        </div>
                        
                        <!-- Top 10 热榜 -->
                        <div class="card p-4">
                            <h3 class="text-lg font-semibold mb-4">今日热榜 Top 10</h3>
                            <div class="space-y-2">
                                ${top_news.map((n, i) => `
                                    <div class="flex items-center gap-3 p-2 hover:bg-gray-800/50 rounded-lg transition-colors">
                                        <span class="w-6 h-6 flex items-center justify-center rounded ${i < 3 ? 'bg-yellow-500/20 text-yellow-400' : 'bg-gray-700 text-gray-400'} font-bold text-sm">
                                            ${n.rank}
                                        </span>
                                        <span class="text-xs text-gray-500 w-20 truncate">${n.platform}</span>
                                        <a href="${n.url}" target="_blank" class="flex-1 truncate hover:text-cyan-400 transition-colors">
                                            ${n.title}
                                        </a>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                },
                
                renderChart(chartData) {
                    const ctx = document.getElementById('trendChart');
                    if (!ctx || !chartData) return;
                    
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: chartData.news.map(d => d.date.slice(5)),
                            datasets: [
                                {
                                    label: '新闻热榜',
                                    data: chartData.news.map(d => d.count),
                                    borderColor: '#00e5ff',
                                    backgroundColor: 'rgba(0, 229, 255, 0.1)',
                                    tension: 0.4,
                                    fill: true
                                },
                                {
                                    label: 'RSS',
                                    data: chartData.rss.map(d => d.count),
                                    borderColor: '#8b5cf6',
                                    backgroundColor: 'rgba(139, 92, 246, 0.1)',
                                    tension: 0.4,
                                    fill: true
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    labels: { color: '#9ca3af' }
                                }
                            },
                            scales: {
                                x: {
                                    grid: { color: '#1f2937' },
                                    ticks: { color: '#9ca3af' }
                                },
                                y: {
                                    grid: { color: '#1f2937' },
                                    ticks: { color: '#9ca3af' }
                                }
                            }
                        }
                    });
                },
                
                renderNews() {
                    return `
                        <div class="card p-4">
                            <!-- 筛选器 -->
                            <div class="flex flex-wrap gap-4 mb-4">
                                <select x-model="newsFilter.platform" @change="newsData.page = 1; loadNews()" 
                                        class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2">
                                    <option value="">全部平台</option>
                                    <template x-for="p in newsData.platforms" :key="p.id">
                                        <option :value="p.id" x-text="p.name"></option>
                                    </template>
                                </select>
                                <select x-model="newsFilter.sort_by" @change="loadNews()"
                                        class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2">
                                    <option value="rank">按排名</option>
                                    <option value="crawl_count">按出现次数</option>
                                    <option value="first_crawl_time">按首次出现</option>
                                </select>
                                <input type="text" x-model="newsFilter.keyword" @keyup.enter="newsData.page = 1; loadNews()"
                                       placeholder="搜索标题..." 
                                       class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 flex-1 min-w-[200px]">
                                <button @click="newsData.page = 1; loadNews()" class="btn-primary">搜索</button>
                            </div>
                            
                            <!-- 表格 -->
                            <div class="overflow-x-auto">

                renderTimelineBars(timeline) {
                    if (!timeline?.periods || !timeline?.day_plans) return '';
                    
                    const dayPlan = timeline.day_plans[timeline.week_map[new Date().getDay() || 7]];
                    if (!dayPlan) return '';
                    
                    const colors = ['bg-blue-500', 'bg-purple-500', 'bg-green-500', 'bg-yellow-500', 'bg-pink-500'];
                    let html = '';
                    
                    dayPlan.periods.forEach((periodKey, idx) => {
                        const period = timeline.periods[periodKey];
                        if (!period) return;
                        
                        const start = parseInt(period.start.split(':')[0]) + parseInt(period.start.split(':')[1]) / 60;
                        const end = parseInt(period.end.split(':')[0]) + parseInt(period.end.split(':')[1]) / 60;
                        const left = (start / 24) * 100;
                        const width = ((end - start + (end < start ? 24 : 0)) / 24) * 100;
                        
                        html += `<div class="timeline-bar absolute ${colors[idx % colors.length]}" style="left: ${left}%; width: ${width}%;" title="${period.name}">${period.name}</div>`;
                    });
                    
                    return html;
                },

                // ========== 操作方法 ==========
                async runAction(actionType) {
                    try {
                        const res = await this.apiCall(`/api/actions/${actionType}`, {
                            method: 'POST',
                            body: JSON.stringify({})
                        });
                        
                        if (res.success) {
                            this.runningActions[actionType] = true;
                            this.logs[actionType] = ['开始执行...'];
                            this.connectLogStream(actionType, res.data.action_id);
                        } else {
                            alert(res.error || '执行失败');
                        }
                    } catch (e) {
                        alert('执行失败: ' + e.message);
                    }
                },
                
                connectLogStream(actionType, actionId) {
                    const eventSource = new EventSource(`/api/actions/${actionId}/logs`);
                    
                    eventSource.onmessage = (e) => {
                        const data = JSON.parse(e.data);
                        
                        if (data.done) {
                            eventSource.close();
                            this.runningActions[actionType] = false;
                            if (data.exit_code !== 0) {
                                this.logs[actionType].push(`执行结束，退出码: ${data.exit_code}`);
                            } else {
                                this.logs[actionType].push('执行完成');
                            }
                            return;
                        }
                        
                        if (!this.logs[actionType]) this.logs[actionType] = [];
                        this.logs[actionType].push(`[${data.ts}] [${data.level}] ${data.line}`);
                    };
                    
                    eventSource.onerror = () => {
                        eventSource.close();
                        this.runningActions[actionType] = false;
                    };
                },
                
                async saveConfig() {
                    try {
                        const res = await this.apiCall(`/api/config/${this.activeConfigTab}`, {
                            method: 'PUT',
                            body: JSON.stringify({ content: this.configContent })
                        });
                        
                        if (res.success) {
                            alert('保存成功');
                            this.loadConfig();
                        } else {
                            alert('保存失败: ' + res.error);
                        }
                    } catch (e) {
                        alert('保存失败: ' + e.message);
                    }
                },
                
                async restoreBackup(filename) {
                    if (!confirm('确定要恢复此备份吗？当前配置将被备份。')) return;
                    
                    try {
                        const res = await this.apiCall(`/api/config/${this.activeConfigTab}/restore`, {
                            method: 'POST',
                            body: JSON.stringify({ backup_filename: filename })
                        });
                        
                        if (res.success) {
                            alert('恢复成功');
                            this.loadConfig();
                        } else {
                            alert('恢复失败: ' + res.error);
                        }
                    } catch (e) {
                        alert('恢复失败: ' + e.message);
                    }
                },
                
                async sendTestNotification() {
                    if (!this.testChannel) {
                        alert('请选择渠道');
                        return;
                    }
                    
                    try {
                        const res = await this.apiCall('/api/actions/test_notification', {
                            method: 'POST',
                            body: JSON.stringify({
                                channel: this.testChannel,
                                message: this.testMessage || '这是一条测试消息'
                            })
                        });
                        
                        if (res.success) {
                            alert('测试消息已发送');
                        } else {
                            alert('发送失败: ' + res.error);
                        }
                    } catch (e) {
                        alert('发送失败: ' + e.message);
                    }
                },
                
                async showRankHistory(newsId) {
                    try {
                        const res = await this.apiCall(`/api/news/${newsId}/rank-history`);
                        if (res.success && res.data.history.length > 0) {
                            const history = res.data.history;
                            const labels = history.map(h => h.crawl_time.slice(11, 16));
                            const data = history.map(h => h.rank);
                            
                            // 创建弹窗显示图表
                            const modal = document.createElement('div');
                            modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50';
                            modal.innerHTML = `
                                <div class="card p-6 w-full max-w-2xl">
                                    <h3 class="text-lg font-semibold mb-4">排名历史</h3>
                                    <canvas id="rankChart" height="200"></canvas>
                                    <button onclick="this.closest('.fixed').remove()" class="btn-secondary w-full mt-4">关闭</button>
                                </div>
                            `;
                            document.body.appendChild(modal);
                            
                            new Chart(document.getElementById('rankChart'), {
                                type: 'line',
                                data: {
                                    labels: labels,
                                    datasets: [{
                                        label: '排名',
                                        data: data,
                                        borderColor: '#00e5ff',
                                        tension: 0.4,
                                        fill: false
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    scales: {
                                        y: {
                                            reverse: true,
                                            min: 1,
                                            grid: { color: '#1f2937' },
                                            ticks: { color: '#9ca3af' }
                                        },
                                        x: {
                                            grid: { color: '#1f2937' },
                                            ticks: { color: '#9ca3af' }
                                        }
                                    },
                                    plugins: {
                                        legend: { labels: { color: '#9ca3af' } }
                                    }
                                }
                            });
                        } else {
                            alert('暂无排名历史数据');
                        }
                    } catch (e) {
                        alert('获取排名历史失败');
                    }
                }
            }
        }
    </script>
</body>
</html>
